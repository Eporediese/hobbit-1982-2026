<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hobbit</title>
<style>
  :root { --bg:#14110e; --fg:#e8dcc8; --dim:#8a7f6d; --accent:#7fd6d0; --echo:#c9a227; }
  * { box-sizing:border-box }
  body { margin:0; background:var(--bg); color:var(--fg); font:16px/1.55 ui-monospace,
         "Cascadia Mono",Menlo,Consolas,monospace; height:100dvh; display:flex;
         flex-direction:column }
  header { padding:.6rem 1rem; border-bottom:1px solid #2b2620; color:var(--dim);
           display:flex; gap:1rem; align-items:baseline; flex-wrap:wrap }
  header b { color:var(--fg); font-weight:600 }
  header a { margin-left:auto; color:var(--dim); text-decoration:none; font-size:.85rem }
  header a:hover, header a:focus { color:var(--accent); outline:none }
  #scroll { flex:1; overflow-y:auto; padding:1rem; white-space:pre-wrap;
            overflow-wrap:anywhere }
  #scroll div { min-height:1.55em }
  .echo  { color:var(--echo) }
  .pending { color:var(--dim); font-style:italic; animation:pulse 1.1s ease-in-out infinite }
  @keyframes pulse { 0%,100% { opacity:.4 } 50% { opacity:.9 } }
  input:disabled { opacity:.6 }
  form { display:flex; gap:.5rem; padding:.75rem 1rem; border-top:1px solid #2b2620 }
  input { flex:1; background:#1d1a15; color:var(--fg); border:1px solid #35302a;
          border-radius:6px; padding:.6rem .75rem; font:inherit }
  input:focus { outline:2px solid var(--accent); outline-offset:-1px }
  button { background:#35302a; color:var(--fg); border:0; border-radius:6px;
           padding:.6rem 1rem; font:inherit; cursor:pointer }
  .panel { margin:auto; padding:2rem; max-width:28rem; text-align:center }
  .panel h1 { font-weight:600; letter-spacing:.03em }
  .panel form { border:0; padding:0; margin-top:1rem }
  .err { color:#c98; min-height:1.4em }
  .choices { display:flex; flex-direction:column; gap:.75rem; margin-top:1.25rem;
             text-align:left }
  .choice { display:flex; flex-direction:column; gap:.35rem; padding:1rem;
            background:#1d1a15; border:1px solid #35302a; border-radius:8px;
            cursor:pointer; font:inherit; color:var(--fg) }
  .choice:hover, .choice:focus { border-color:var(--accent); outline:none }
  .choice b { color:var(--fg); font-size:1.05rem }
  .choice span { color:var(--dim); font-size:.9rem; line-height:1.45 }
  .banner { display:block; width:100%; max-width:22rem; margin:0 auto 1.5rem }
  .banner svg { display:block; width:100% }
  .switch { margin-top:1.25rem; color:var(--dim); font-size:.9rem }
  .switch a { color:var(--accent); text-decoration:none }
  .switch a:hover, .switch a:focus { text-decoration:underline; outline:none }
</style>

<!-- The shared word, if the server asks for one -->
<div class="panel" id="gate" hidden>
  <h1>The Hobbit</h1>
  <p>Speak, friend, and enter.</p>
  <form id="gateform">
    <input id="password" type="password" placeholder="the word"
           autocomplete="current-password">
    <button>Enter</button>
  </form>
  <p class="err" id="gateerr"></p>
</div>

<!-- Who is playing -->
<div class="panel" id="namepanel" hidden>
  <h1>The Hobbit</h1>
  <p>By what name shall the company know you?</p>
  <form id="nameform">
    <input id="nameinput" placeholder="your name" autocomplete="off"
           maxlength="32">
    <button>Begin</button>
  </form>
  <p class="err" id="nameerr"></p>
</div>

<!-- The front door: which of the two editions -->
<div class="panel" id="frontdoor" hidden>
  <h1>The Hobbit</h1>
  <p>Two editions, forty-four years apart. Which will you play?</p>
  <div class="choices">
    <button class="choice" data-edition="enhanced">
      <b>The Enhanced Game</b>
      <span>The recreation: a world that moves while you're away, companions
            with a voice, the puzzles made winnable. Recommended.</span>
    </button>
    <button class="choice" data-edition="1982">
      <b>The 1982 Edition</b>
      <span>The original as it shipped — reverted prose, the quirky locks (some
            rooms unreachable), the hunger death-spiral. Faithful, and not
            always winnable.</span>
    </button>
  </div>
  <p class="switch" id="whoami" hidden>Playing as <b id="whoisit"></b>.
     <a href="#" id="switchplayer">Not you?</a></p>
</div>

<!-- A crossroads: you chose an edition you have no game in, but a journey is
     waiting under the other one. Offer it rather than silently starting fresh. -->
<div class="panel" id="crossroads" hidden>
  <h1>The Hobbit</h1>
  <p id="crossmsg"></p>
  <div class="choices">
    <button class="choice" id="crosscontinue">
      <b id="crosscontinueb"></b><span id="crosscontinues"></span></button>
    <button class="choice" id="crossfresh">
      <b id="crossfreshb"></b><span id="crossfreshs"></span></button>
  </div>
</div>

<!-- The game -->
<header hidden id="bar">
  <b>The Hobbit</b><span id="who"></span>
  <a href="#" id="tofront" title="Back to the front door">⌂ editions</a>
</header>
<div id="scroll" hidden></div>
<form id="turn" hidden>
  <input id="cmd" placeholder="What do you do?" autocomplete="off">
  <button>Go</button>
</form>

<!-- The round door of Bag End, then and now: a 1982 green-screen line drawing
     beside a warm, full-colour version. Painted onto the landing screens (the
     clipPath id is made unique per copy in script). -->
<template id="banner-art">
  <div class="banner">
    <svg viewBox="0 0 440 180" role="img" xmlns="http://www.w3.org/2000/svg">
      <title>The Hobbit, then and now</title>
      <desc>The round green door of Bag End as a 1982 green-screen line drawing
            beside a warm, full-colour version. Forty-four years apart.</desc>
      <defs><clipPath id="scr"><rect x="232" y="8" width="200" height="140" rx="7"/></clipPath></defs>

      <rect x="8" y="8" width="200" height="140" rx="7" fill="#0a0a08" stroke="#2b2620"/>
      <g stroke="#33ff66" stroke-width="1.6" fill="none" stroke-linecap="round">
        <path d="M22 140 Q108 74 194 140"/>
        <circle cx="108" cy="106" r="26"/>
        <circle cx="108" cy="106" r="17"/>
        <circle cx="60" cy="120" r="8"/>
        <line x1="108" y1="74" x2="108" y2="56"/>
        <circle cx="108" cy="46" r="10"/>
        <line x1="98" y1="140" x2="80" y2="147"/>
        <line x1="118" y1="140" x2="136" y2="147"/>
      </g>
      <circle cx="120" cy="106" r="2.4" fill="#33ff66"/>

      <rect x="232" y="8" width="200" height="140" rx="7" fill="#c6dde8" stroke="#2b2620"/>
      <g clip-path="url(#scr)">
        <path d="M232 149 Q332 68 432 149 Z" fill="#6aa845"/>
        <path d="M232 149 Q332 70 432 149" fill="none" stroke="#4c8232" stroke-width="1.5"/>
        <rect x="266" y="60" width="6" height="24" fill="#6b4a2b"/>
        <circle cx="256" cy="60" r="10" fill="#6cae48"/>
        <circle cx="282" cy="60" r="10" fill="#6cae48"/>
        <circle cx="269" cy="53" r="15" fill="#5f9e3f"/>
        <polygon points="320,134 344,134 360,148 302,148" fill="#d8c48a"/>
        <circle cx="332" cy="108" r="27" fill="#407d3a" stroke="#7a4e28" stroke-width="3.5"/>
        <line x1="332" y1="82" x2="332" y2="134" stroke="#2f5e2c" stroke-width="1"/>
        <circle cx="348" cy="108" r="3" fill="#e8c14a"/>
        <circle cx="288" cy="120" r="9" fill="#ffd97a" stroke="#7a4e28" stroke-width="2"/>
        <circle cx="376" cy="115" r="7" fill="#ffd97a" stroke="#7a4e28" stroke-width="2"/>
      </g>

      <text x="108" y="167" text-anchor="middle" fill="#8a7f6d"
            font-family="ui-monospace,monospace" font-size="12">1982</text>
      <text x="332" y="167" text-anchor="middle" fill="#8a7f6d"
            font-family="ui-monospace,monospace" font-size="12">2026</text>
    </svg>
  </div>
</template>

<script>
const $ = s => document.querySelector(s);
let name = localStorage.getItem("hobbit-name") || "";
let edition = localStorage.getItem("hobbit-edition") || "";

// Paint the then/now banner onto the landing screens. The template's clipPath
// id has to be made unique in each copy, or the second copy would reference the
// first's clip.
(function paintBanner() {
  const tpl = document.getElementById("banner-art");
  document.querySelectorAll("#gate, #frontdoor, #namepanel").forEach((panel, i) => {
    const frag = tpl.content.cloneNode(true);
    const clip = frag.querySelector("clipPath");
    const clipped = frag.querySelector("[clip-path]");
    if (clip && clipped) { clip.id = "scr" + i; clipped.setAttribute("clip-path", `url(#scr${i})`); }
    panel.insertBefore(frag, panel.firstChild);
  });
})();

function only(id) {
  for (const el of ["gate", "frontdoor", "namepanel", "crossroads",
                    "bar", "scroll", "turn"])
    $("#" + el).hidden = true;
  if (id === "game") { $("#bar").hidden = $("#scroll").hidden = $("#turn").hidden = false; }
  else $("#" + id).hidden = false;
  if (id === "frontdoor") paintFrontDoor();
}

// The front door shows who it thinks you are, with a way to switch.
function paintFrontDoor() {
  const who = $("#whoami");
  if (name) { $("#whoisit").textContent = name; who.hidden = false; }
  else who.hidden = true;
}

$("#switchplayer").onclick = e => {
  e.preventDefault();
  name = "";
  localStorage.removeItem("hobbit-name");
  only("namepanel");
  $("#nameinput").value = "";
  $("#nameinput").focus();
};

function show(lines) {
  const box = $("#scroll");
  for (const html of (lines || [])) {
    const div = document.createElement("div");
    div.innerHTML = html;
    box.appendChild(div);
  }
  box.scrollTop = box.scrollHeight;
}

// One place all requests go through, so a 401 always lands on the gate.
async function api(path, opts) {
  const r = await fetch(path, opts);
  if (r.status === 401) { only("gate"); $("#password").focus(); throw new Error("locked"); }
  return r.json();
}
const send = (path, payload) => api(path, {
  method: "POST", headers: {"Content-Type": "application/json"},
  body: JSON.stringify(payload)
});

$("#gateform").onsubmit = async e => {
  e.preventDefault();
  const r = await fetch("/api/login", {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({password: $("#password").value})
  });
  if (r.ok) begin();
  else $("#gateerr").textContent = "That is not the word.";
};

$("#nameform").onsubmit = e => {
  e.preventDefault();
  const chosen = $("#nameinput").value.trim();
  if (!chosen) { $("#nameerr").textContent = "A name, please."; return; }
  name = chosen;
  localStorage.setItem("hobbit-name", name);
  begin();
};

// The front door: choose an edition, then on into the game (or the name
// screen, if we don't know you yet). The two editions are separate journeys.
for (const b of document.querySelectorAll("#frontdoor .choice")) {
  b.onclick = () => {
    edition = b.dataset.edition;
    localStorage.setItem("hobbit-edition", edition);
    begin();
  };
}

// The way back out: the header link returns to the front door to switch
// editions, without disturbing either game.
$("#tofront").onclick = e => { e.preventDefault(); only("frontdoor"); };

// Command history: Up/Down walk through past commands, the way the terminal
// did. `pos` is where we are in the list (== length means "not browsing"),
// and `draft` holds the half-typed line so stepping back and forward returns
// it. Newest command is last.
let history = [];
let pos = 0, draft = "";

let busy = false;

$("#turn").onsubmit = async e => {
  e.preventDefault();
  const text = $("#cmd").value.trim();
  if (!text || busy) return;               // one turn at a time
  if (history[history.length - 1] !== text) history.push(text);
  if (history.length > 100) history.shift();
  pos = history.length;
  draft = "";
  $("#cmd").value = "";

  // Echo the command at once, so there is instant proof it was heard, and mark
  // that the company is thinking -- a world-advancing turn waits on the model
  // for a few seconds, and a silent screen in that gap reads as a hang.
  show([`<span class="echo">&gt; ${escapeHtml(text)}</span>`]);
  const pending = pendingLine();
  setBusy(true);
  try {
    const data = await send("/api/command", {name, text, edition});
    pending.remove();
    // 'restart' backs out to the front door rather than dropping you back in.
    if (data.reset) { only("frontdoor"); return; }
    // The server echoes the command too; we already have, so drop its copy.
    show((data.lines || []).filter(l => !l.startsWith('<span class="echo"')));
  } catch (err) {
    pending.remove();
    show(['<span class="echo">(the company did not answer -- try again)</span>']);
  } finally {
    setBusy(false);
    $("#cmd").focus();
  }
};

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#x27;"}[c]));
}

function pendingLine() {
  const box = $("#scroll");
  const div = document.createElement("div");
  div.className = "pending";
  div.textContent = "the company stirs…";
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}

function setBusy(on) {
  busy = on;
  $("#cmd").disabled = on;
  if (!on) $("#cmd").focus();
}

$("#cmd").addEventListener("keydown", e => {
  if (e.key === "ArrowUp") {
    if (!history.length) return;
    if (pos === history.length) draft = $("#cmd").value;   // remember the draft
    pos = Math.max(0, pos - 1);
    e.preventDefault();
    setInput(history[pos]);
  } else if (e.key === "ArrowDown") {
    if (pos === history.length) return;
    pos = Math.min(history.length, pos + 1);
    e.preventDefault();
    setInput(pos === history.length ? draft : history[pos]);
  }
});

function setInput(value) {
  const el = $("#cmd");
  el.value = value;
  // Put the caret at the end, as a shell does when you recall a line.
  requestAnimationFrame(() => el.setSelectionRange(value.length, value.length));
}

async function begin() {
  // Front door first: the edition is chosen before anything else. Then a name,
  // then that edition's game -- resumed if it exists, started fresh if not.
  if (!edition) { only("frontdoor"); return; }
  if (!name) { only("namepanel"); $("#nameinput").focus(); return; }
  const state = await api("/api/state?" + query(edition));
  if (!state.new) { resume(state); return; }
  // No game in this edition yet. Before starting fresh, make sure we aren't
  // stranding a journey the player has under the OTHER edition (the trap that
  // made a wrong-door pick look like a lost save).
  const other = edition === "1982" ? "enhanced" : "1982";
  const otherState = await api("/api/state?" + query(other));
  if (!otherState.new) { crossroads(other); return; }
  play();
}

const query = ed => "name=" + encodeURIComponent(name) +
                    "&edition=" + encodeURIComponent(ed);

function label(ed) {
  return ed === "1982" ? "the 1982 edition" : "the enhanced game";
}
function editionName(ed) {
  return ed === "1982" ? "1982 Edition" : "Enhanced Game";
}
function editionLabel() { return label(edition); }

// The crossroads: chosen edition is empty, but the other holds a journey.
function crossroads(other) {
  $("#crossmsg").innerHTML =
    "You've no " + editionName(edition) + " game as <b>" + escapeHtml(name) +
    "</b> yet — but your " + editionName(other) + " is waiting.";
  $("#crosscontinueb").textContent = "Continue your " + editionName(other);
  $("#crosscontinues").textContent = "Pick up the journey you have in progress.";
  $("#crossfreshb").textContent = "Start a new " + editionName(edition);
  $("#crossfreshs").textContent = "Begin a fresh, separate journey.";
  $("#crosscontinue").onclick = () => {
    edition = other;
    localStorage.setItem("hobbit-edition", edition);
    begin();
  };
  $("#crossfresh").onclick = () => play();
  only("crossroads");
}

// A new game in the chosen edition: the first 'look' creates it.
async function play() {
  only("game");
  $("#who").textContent = name + " · " + editionLabel();
  $("#scroll").innerHTML = "";
  show((await send("/api/command", {name, text: "look", edition})).lines
       .filter(l => !l.startsWith('<span class="echo"')));
  $("#cmd").focus();
}

// A returning game: show the saved scrollback.
function resume(state) {
  only("game");
  $("#who").textContent = name + " · " + editionLabel();
  $("#scroll").innerHTML = "";
  show(state.lines);
  $("#cmd").focus();
}

begin().catch(() => {});
</script>
