# fly.toml app configuration file generated for hobbit-1982-2026 on 2026-07-22T19:56:01-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hobbit-1982-2026'
primary_region = 'lhr'

[build]
[env]
  HOBBIT_SAVES = '/data/saves'

[[mounts]]
  source = 'hobbit_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
